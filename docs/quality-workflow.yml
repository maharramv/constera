name: ConstEra quality

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: constera-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit-and-layout:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run project audit
        run: npm run check

      - name: Run layout regression tests
        run: npm run test:layout

      - name: Upload browser report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: constera-playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7
